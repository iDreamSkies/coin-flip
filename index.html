<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Пить или не пить?</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #0d0d0f;
    color: #f0f0f0;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    min-height: 100dvh;
    padding: 1.2rem 1.2rem 1.8rem;
    position: relative;
    gap: 0;
  }

  /* частицы фона */
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle  { position: absolute; border-radius: 50%; opacity: 0; animation: float linear infinite; }
  @keyframes float {
    0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.4; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
  }

  /* ===== ШАПКА ===== */
  .header {
    position: relative;
    z-index: 1;
    text-align: center;
    width: 100%;
  }
  .header h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #444;
    text-transform: uppercase;
    margin-bottom: 0.7rem;
  }

  /* режимы */
  .modes {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
    justify-content: center;
    flex-wrap: nowrap;
  }
  .modes::-webkit-scrollbar { display: none; }
  .mode-tab {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid #2a2a2a;
    background: transparent;
    color: #555;
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .mode-tab.active {
    background: #1e1e1e;
    border-color: #f5c842;
    color: #f5c842;
  }

  /* счётчик */
  .stats {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.78rem;
    font-weight: 600;
    color: #333;
  }
  .stats span { transition: color 0.3s; }
  .stats .yes-count { color: #2a5a3a; }
  .stats .no-count  { color: #5a2a2a; }
  .stats .sep       { color: #222; }

  /* ===== МОНЕТА ===== */
  .scene {
    position: relative;
    z-index: 1;
    perspective: 900px;
    width: 210px;
    height: 210px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .coin-floater { width: 100%; height: 100%; position: relative; }
  .coin-floater.idle { animation: idle-pulse 2.2s ease-in-out infinite; }
  @keyframes idle-pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.07); }
  }
  .coin {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    will-change: transform;
  }
  .face {
    position: absolute; inset: 0;
    border-radius: 50%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }
  .face img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
  .face-front { transform: rotateY(0deg); }
  .face-back  { transform: rotateY(180deg); }

  .result-ring {
    position: absolute; inset: -12px;
    border-radius: 50%; opacity: 0;
    transition: opacity 0.4s; pointer-events: none;
  }
  .result-ring.drink-ring    { box-shadow: 0 0 40px 14px rgba(74,222,128,0.6), 0 0 80px 28px rgba(74,222,128,0.2); }
  .result-ring.no-drink-ring { box-shadow: 0 0 40px 14px rgba(239,68,68,0.6),  0 0 80px 28px rgba(239,68,68,0.2); }
  .result-ring.show          { opacity: 1; }

  /* ===== СЕРИЯ ===== */
  .series-dots {
    position: relative; z-index: 1;
    display: flex; gap: 8px; align-items: center;
    min-height: 18px;
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #222; border: 1px solid #333;
    transition: all 0.3s;
  }
  .dot.yes { background: #22c55e; border-color: #22c55e; }
  .dot.no  { background: #ef4444; border-color: #ef4444; }

  /* ===== ФРАЗА ===== */
  .phrase-wrap {
    position: relative; z-index: 1;
    text-align: center;
    min-height: 52px;
    display: flex; align-items: center; justify-content: center;
    width: 100%;
  }
  .phrase {
    font-size: 0.98rem;
    font-weight: 500;
    line-height: 1.5;
    color: #555;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.3s, transform 0.3s;
    padding: 0 0.5rem;
  }
  .phrase.visible { opacity: 1; transform: translateY(0); }
  .phrase.drink    { color: #4ade80; }
  .phrase.no-drink { color: #ef4444; }

  .phrase span {
    display: inline-block;
    opacity: 0;
    transform: translateY(6px);
    animation: letterIn 0.25s forwards;
  }
  @keyframes letterIn { to { opacity: 1; transform: translateY(0); } }

  /* ===== КНОПКИ ===== */
  .btn-area {
    position: relative; z-index: 1;
    width: 100%; display: flex; flex-direction: column; gap: 8px;
  }
  .btn-row { display: flex; gap: 8px; justify-content: center; }
  .btn-row .btn:first-child { flex: 0 1 260px; }
  .btn {
    flex: 1;
    padding: 0.75rem 1.2rem;
    border-radius: 14px; border: none;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.8rem; font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s, background 0.3s, opacity 0.2s;
    background: linear-gradient(135deg, #f5c842, #e09c1a);
    color: #1a0e00;
    box-shadow: 0 4px 20px rgba(245,200,66,0.3);
  }
  .btn:active   { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn.drink-btn    { background: linear-gradient(135deg, #6ee7a0, #22c55e); box-shadow: 0 4px 20px rgba(74,222,128,0.4); color: #052e16; }
  .btn.no-drink-btn { background: linear-gradient(135deg, #f87171, #ef4444); box-shadow: 0 4px 20px rgba(239,68,68,0.4); color: #fff; }

  .btn-share {
    flex: 0 0 auto;
    padding: 0.85rem 1rem;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #888;
    font-size: 0.75rem;
    display: none;
  }
  .btn-share.show { display: block; }

  .btn-series-row { display: flex; gap: 6px; justify-content: center; }
  .btn-series {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid #222;
    background: transparent;
    color: #333;
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-series.active { border-color: #f5c84280; color: #f5c842; background: #1a1800; }

  .total-flips {
    position: relative; z-index: 1;
    font-size: 0.68rem; color: #2a2a2a;
    font-weight: 500; letter-spacing: 0.04em;
    min-height: 14px; text-align: center;
    transition: color 0.5s;
  }
  .total-flips.loaded { color: #333; }

  .btn-series-reset {
    padding: 5px 10px;
    border-radius: 20px;
    border: 1px solid #3a1a1a;
    background: transparent;
    color: #4a2020;
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .btn-series-reset.show { display: block; }
  .btn-series-reset:hover { border-color: #ef4444; color: #ef4444; }

  /* тост */
  .toast {
    position: fixed; bottom: 5rem; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #1e1e1e; border: 1px solid #2a2a2a;
    color: #ccc; font-size: 0.8rem; font-weight: 500;
    padding: 8px 18px; border-radius: 20px;
    opacity: 0; transition: all 0.3s; z-index: 100;
    white-space: nowrap; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* fx */
  .fx-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 10; overflow: hidden; }
  .fx-item { position: absolute; top: -40px; opacity: 0; animation: fxfall linear forwards; }
  @keyframes fxfall {
    0%   { opacity: 1; }
    100% { transform: translateY(110vh) rotate(var(--rot)); opacity: 0; }
  }

  /* футер */
  footer { position: relative; z-index: 1; text-align: center; }
  footer a {
    display: inline-flex; align-items: center; gap: 5px;
    text-decoration: none; opacity: 0.2;
    transition: opacity 0.2s;
  }
  footer a:hover { opacity: 0.45; }
</style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="fx-wrap" id="fxWrap"></div>
<div class="toast" id="toast"></div>

<header class="header">
  <h1>Монетка решает</h1>
  <div class="modes" id="modes"></div>
</header>

<div class="stats" id="stats">
  <span class="yes-count" id="yesCount">—</span>
  <span class="sep">·</span>
  <span class="no-count" id="noCount">—</span>
</div>
<div class="total-flips" id="totalFlips"></div>

<div class="scene" id="scene" onclick="flipCoin()">
  <div class="coin-floater idle" id="coinFloater">
    <div class="coin" id="coin">
      <div class="face face-front"><img id="imgYes" src="yes.png" alt="Да"></div>
      <div class="face face-back"><img id="imgNo" src="no.png" alt="Нет"></div>
    </div>
  </div>
  <div class="result-ring" id="resultRing"></div>
</div>

<div class="series-dots" id="seriesDots"></div>

<div class="phrase-wrap">
  <div class="phrase" id="phrase"></div>
</div>

<div class="btn-area">
  <div class="btn-row">
    <button class="btn" id="flipBtn" onclick="flipCoin()">🎲 Бросить монетку</button>
    <button class="btn btn-share" id="shareBtn" onclick="shareResult()">↗</button>
  </div>
  <div class="btn-series-row" id="seriesRow">
  </div>
</div>

<footer>
  <a href="https://t.me/dreamskies">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="#f0f0f0"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L8.32 14.617l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.828.942z"/></svg>
    <span style="font-family:'Inter',sans-serif;font-size:0.68rem;font-weight:500;color:#f0f0f0;letter-spacing:0.03em;">DreamSkies</span>
  </a>
</footer>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.ready(); }

/* ===== РЕЖИМЫ ===== */
const MODES = [
  {
    label: '🍺 Пить?',
    imgYes: 'yes.png', imgNo: 'no.png',
    yes: 'ПИТЬ', no: 'НЕ ПИТЬ',
    phrasesYes: [
      "Монетка не ошибается — наливай!",
      "Вселенная сказала «да». Кто ты такой, чтобы спорить?",
      "Судьба решила. Бармен ждёт.",
      "Хочешь не хочешь, а надо. Монетка велела.",
      "Печень сказала нет. Монетка сказала да. Кто главный?",
      "Это не ты пьёшь — это судьба пьёт твоими руками.",
      "Ответ очевиден. Вопрос — за что пьём?",
      "Медицина рекомендует. В умеренных количествах.",
    ],
    phrasesNo: [
      "Монетка спасла твою печень. Цени.",
      "Трезвость — сила. Монетка знает.",
      "Завтра скажешь монетке спасибо.",
      "Быть трезвым — это весело... так говорят трезвые.",
      "Монетка против. Можно поспорить — но она снова против.",
      "Сегодня нет. Завтра спроси ещё раз.",
      "Твоя печень тихо плачет от счастья.",
      "Монетка проголосовала за минеральную воду.",
    ],
  },
  {
    label: '🚶 Идти?',
    imgYes: 'go_yes.png', imgNo: 'go_no.png',
    yes: 'ИДТИ', no: 'ОСТАТЬСЯ',
    phrasesYes: [
      "Ноги сами знают дорогу.",
      "Вперёд — монетка не трус.",
      "Судьба зовёт. Вставай.",
      "Там лучше. Монетка проверила.",
      "Идёшь. Не обсуждается.",
    ],
    phrasesNo: [
      "Диван мудрее монетки. Иногда.",
      "Остаёшься. Уютно тут.",
      "Никуда не надо. Монетка разрешила.",
      "Домашний режим активирован.",
      "Правильное решение. Наверное.",
    ],
  },
  {
    label: '📞 Звонить?',
    imgYes: 'call_yes.png', imgNo: 'call_no.png',
    yes: 'ЗВОНИТЬ', no: 'НЕ ЗВОНИТЬ',
    phrasesYes: [
      "Звони. Монетка берёт ответственность.",
      "Нажимай. Судьба набирает номер.",
      "Они ждут. Монетка уверена.",
      "Звонишь. Что будет — то будет.",
    ],
    phrasesNo: [
      "Не звони. Напиши лучше.",
      "Тишина — тоже ответ.",
      "Монетка говорит: пусть сами позвонят.",
      "Завтра. Монетка так решила.",
    ],
  },
  {
    label: '🍕 Пицца?',
    imgYes: 'pizza_yes.png', imgNo: 'pizza_no.png',
    yes: 'ЗАКАЗАТЬ', no: 'НЕ НАДО',
    phrasesYes: [
      "Заказывай. Голод — не тётка.",
      "Монетка проголодалась. Ты тоже.",
      "Пицца одобрена судьбой.",
      "Ты заслужил. Монетка знает.",
    ],
    phrasesNo: [
      "Холодильник ближе. Монетка экономит.",
      "Приготовь сам. Монетка верит в тебя.",
      "Бюджет говорит спасибо.",
      "Яичница тоже еда. Монетка решила.",
    ],
  },
  {
    label: '😴 Спать?',
    imgYes: 'sleep_yes.png', imgNo: 'sleep_no.png',
    yes: 'СПАТЬ', no: 'НЕ СПАТЬ',
    phrasesYes: [
      "Спать. Немедленно. Монетка строга.",
      "Подушка ждёт. Монетка тоже устала.",
      "Всё подождёт до утра.",
      "Правильный выбор. Завтра поблагодаришь.",
    ],
    phrasesNo: [
      "Ещё один эпизод. Монетка разрешает.",
      "Спать рано. Жизнь коротка.",
      "Ночь молода. Монетка бодрствует.",
      "В интернете столько всего интересного...",
    ],
  },
];

const SERIES_OPTIONS = [0, 3, 5];

let spinning     = false;
let currentDeg   = 0;
let currentMode  = 0;
let seriesIdx    = 0; // индекс в SERIES_OPTIONS
let seriesScore  = { yes: 0, no: 0 };
let modeStats    = MODES.map(() => ({ yes: 0, no: 0 }));
let lastResult   = null;
let lastPhrase   = '';

/* ===== DOM ===== */
const coin        = document.getElementById('coin');
const coinFloater = document.getElementById('coinFloater');
const phraseEl    = document.getElementById('phrase');
const flipBtn     = document.getElementById('flipBtn');
const shareBtn    = document.getElementById('shareBtn');
const resultRing  = document.getElementById('resultRing');
const seriesDots  = document.getElementById('seriesDots');
const yesCountEl  = document.getElementById('yesCount');
const noCountEl   = document.getElementById('noCount');
const toastEl     = document.getElementById('toast');

/* ===== РЕЖИМЫ UI ===== */
function buildModes() {
  const wrap = document.getElementById('modes');
  MODES.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'mode-tab' + (i === 0 ? ' active' : '');
    btn.textContent = m.label;
    btn.onclick = () => setMode(i);
    wrap.appendChild(btn);
  });
}

function setMode(i) {
  currentMode = i;
  document.querySelectorAll('.mode-tab').forEach((b, j) => b.classList.toggle('active', j === i));
  const m = MODES[i];
  document.getElementById('imgYes').src = m.imgYes;
  document.getElementById('imgNo').src  = m.imgNo;
  resetRound();
  updateStats();
}

/* ===== СЕРИЯ UI ===== */
function buildSeries() {
  const wrap = document.getElementById('seriesRow');
  ['Серия: выкл', 'Лучший из 3', 'Лучший из 5'].forEach((label, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-series' + (i === 0 ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => setSeries(i);
    wrap.appendChild(btn);
  });
  const reset = document.createElement('button');
  reset.id = 'resetSeriesBtn';
  reset.className = 'btn-series-reset';
  reset.textContent = '✕';
  reset.title = 'Сбросить серию';
  reset.onclick = resetSeries;
  wrap.appendChild(reset);
}

function setSeries(i) {
  seriesIdx = i;
  seriesScore = { yes: 0, no: 0 };
  document.querySelectorAll('.btn-series').forEach((b, j) => b.classList.toggle('active', j === i));
  document.getElementById('resetSeriesBtn').classList.toggle('show', i > 0);
  renderSeriesDots();
  resetRound();
}

function resetSeries() {
  seriesScore = { yes: 0, no: 0 };
  renderSeriesDots();
  showToast('Серия сброшена');
}

function renderSeriesDots() {
  const total = SERIES_OPTIONS[seriesIdx];
  seriesDots.innerHTML = '';
  if (!total) return;
  const needed = Math.ceil(total / 2);
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot' +
      (i < seriesScore.yes ? ' yes' : '') +
      (i >= total - seriesScore.no ? ' no' : '');
    seriesDots.appendChild(d);
  }
}

/* ===== СЧЁТЧИК ===== */
function updateStats() {
  const s   = modeStats[currentMode];
  const m   = MODES[currentMode];
  yesCountEl.textContent = m.yes[0] + m.yes.slice(1).toLowerCase() + ': ' + s.yes;
  noCountEl.textContent  = m.no[0]  + m.no.slice(1).toLowerCase()  + ': ' + s.no;
  yesCountEl.style.color = s.yes > 0 ? '#2d6b42' : '#2a5a3a';
  noCountEl.style.color  = s.no  > 0 ? '#7a2a2a' : '#5a2a2a';
}

/* ===== АУДИО ===== */
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTick() {
  try {
    const ctx = getAudio();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 600 + Math.random() * 200;
    o.type = 'sine';
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
    o.start(); o.stop(ctx.currentTime + 0.04);
  } catch(e) {}
}

function playResult(isDrink) {
  try {
    const ctx = getAudio();
    const notes = isDrink ? [523, 659, 784, 1047] : [400, 350, 300];
    notes.forEach((freq, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq; o.type = 'sine';
      const t = ctx.currentTime + i * (isDrink ? 0.1 : 0.13);
      g.gain.setValueAtTime(0.12, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      o.start(t); o.stop(t + 0.25);
    });
  } catch(e) {}
}

/* ===== ХАПТИК ===== */
function haptic(type) {
  try {
    if (tg?.HapticFeedback) {
      if (type === 'impact')       tg.HapticFeedback.impactOccurred('medium');
      else if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
      else if (type === 'warning') tg.HapticFeedback.notificationOccurred('warning');
    } else { navigator.vibrate?.([30]); }
  } catch(e) {}
}

/* ===== ТОСТ ===== */
function showToast(text) {
  toastEl.textContent = text;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2000);
}

/* ===== СБРОС ===== */
function resetRound() {
  phraseEl.className = 'phrase';
  phraseEl.innerHTML = '';
  resultRing.className = 'result-ring';
  shareBtn.classList.remove('show');
  flipBtn.className = 'btn';
  flipBtn.textContent = '🎲 Бросить монетку';
  flipBtn.disabled = false;
  lastResult = null;
}

/* ===== БРОСОК ===== */
function flipCoin() {
  if (spinning) return;
  spinning = true;
  flipBtn.disabled = true;
  shareBtn.classList.remove('show');
  haptic('impact');
  incrementFlips();

  phraseEl.className = 'phrase';
  phraseEl.innerHTML = '';
  resultRing.className = 'result-ring';
  coinFloater.classList.remove('idle');

  const result     = Math.random() < 0.5 ? 'yes' : 'no';
  const finalAngle = result === 'yes' ? 0 : 180;
  const spins      = 8 + Math.floor(Math.random() * 5);
  const fromDeg    = currentDeg % 360;
  const toDeg      = fromDeg + (spins * 360 - fromDeg % 360) + finalAngle;
  const duration   = 2400;
  const start      = performance.now();
  let   lastTick   = 0;

  function easeOut(t) { return 1 - Math.pow(1 - t, 3.5); }

  let spinInterval = setInterval(() => {
    const p = Math.min((performance.now() - start) / duration, 1);
    const speed = 1 - p;
    if (speed < 0.08) { clearInterval(spinInterval); return; }
    try {
      if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred(speed > 0.5 ? 'medium' : 'light');
      else navigator.vibrate?.(speed > 0.5 ? 15 : 8);
    } catch(e) {}
    if (performance.now() - lastTick > 80) { playTick(); lastTick = performance.now(); }
  }, 120);

  function animate(now) {
    const p   = Math.min((now - start) / duration, 1);
    const deg = fromDeg + (toDeg - fromDeg) * easeOut(p);
    coin.style.transform = `rotateY(${deg}deg)`;
    currentDeg = deg;
    if (p < 1) {
      requestAnimationFrame(animate);
    } else {
      clearInterval(spinInterval);
      coin.style.transform = `rotateY(${finalAngle}deg)`;
      currentDeg = finalAngle;
      onLanded(result);
    }
  }

  requestAnimationFrame(animate);
}

/* ===== РЕЗУЛЬТАТ ===== */
function onLanded(result) {
  spinning  = false;
  lastResult = result;

  const mode  = MODES[currentMode];
  const isDrink = result === 'yes';

  haptic(isDrink ? 'success' : 'warning');
  playResult(isDrink);

  // статистика
  modeStats[currentMode][result]++;
  updateStats();

  // свечение
  resultRing.className = `result-ring ${isDrink ? 'drink-ring' : 'no-drink-ring'} show`;

  // фраза
  const pool = isDrink ? mode.phrasesYes : mode.phrasesNo;
  lastPhrase = pool[Math.floor(Math.random() * pool.length)];
  animatePhrase(lastPhrase, isDrink ? 'drink' : 'no-drink');

  // кнопка
  flipBtn.className   = `btn ${isDrink ? 'drink-btn' : 'no-drink-btn'}`;
  flipBtn.textContent = '🎲 Ещё раз';
  flipBtn.disabled    = false;
  shareBtn.classList.add('show');

  // серия
  const total = SERIES_OPTIONS[seriesIdx];
  if (total) {
    seriesScore[result]++;
    renderSeriesDots();
    const needed = Math.ceil(total / 2);
    if (seriesScore.yes >= needed || seriesScore.no >= needed) {
      const winner = seriesScore.yes >= needed ? mode.yes : mode.no;
      setTimeout(() => {
        showToast('🏆 ' + winner + ' побеждает в серии!');
        seriesScore = { yes: 0, no: 0 };
        setTimeout(() => renderSeriesDots(), 2100);
      }, 600);
    }
  }

  // эффекты
  if (isDrink) spawnFireworks();
  else spawnSadEmojis();

  setTimeout(() => coinFloater.classList.add('idle'), 400);
}

/* ===== АНИМАЦИЯ БУКВ ===== */
function animatePhrase(text, cls) {
  phraseEl.innerHTML = text.split('').map((ch, i) =>
    `<span style="animation-delay:${i * 25}ms">${ch === ' ' ? '&nbsp;' : ch}</span>`
  ).join('');
  phraseEl.className = `phrase ${cls} visible`;
}

/* ===== ПОДЕЛИТЬСЯ ===== */
async function shareResult() {
  if (!lastResult) return;
  const mode = MODES[currentMode];
  const label = lastResult === 'yes' ? mode.yes : mode.no;
  const text = `${lastResult === 'yes' ? '✅' : '❌'} Монетка решила: ${label}!\n"${lastPhrase}"\n\nt.me/drink_or_not_bot/coin`;
  try {
    if (navigator.share) {
      await navigator.share({ text });
    } else {
      await navigator.clipboard.writeText(text);
      showToast('Скопировано в буфер!');
    }
  } catch(e) {
    try {
      await navigator.clipboard.writeText(text);
      showToast('Скопировано в буфер!');
    } catch(e2) { showToast('Не удалось скопировать'); }
  }
}

/* ===== ФЕЙРВЕРК ===== */
function spawnFireworks() {
  const wrap = document.getElementById('fxWrap');
  wrap.innerHTML = '';
  const colors = ['#4ade80','#22c55e','#86efac','#f5c842','#fff','#bbf7d0'];
  for (let i = 0; i < 55; i++) {
    const el = document.createElement('div');
    el.className = 'fx-item';
    const size = 6 + Math.random() * 10;
    el.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.4?'50%':'3px'};--rot:${Math.round(Math.random()*720-360)}deg;animation-delay:${Math.random()*0.6}s;animation-duration:${1.3+Math.random()*1}s;`;
    wrap.appendChild(el);
  }
  setTimeout(() => { wrap.innerHTML = ''; }, 2800);
}

/* ===== ГРУСТНЫЕ СМАЙЛЫ ===== */
function spawnSadEmojis() {
  const wrap   = document.getElementById('fxWrap');
  wrap.innerHTML = '';
  const emojis = ['😢','😭','😔','💔','😞','🥲','😿'];
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'fx-item';
    const size = 22 + Math.random() * 16;
    el.style.cssText = `left:${Math.random()*100}%;font-size:${size}px;--rot:${Math.round(Math.random()*40-20)}deg;animation-delay:${Math.random()*0.8}s;animation-duration:${2+Math.random()*1.2}s;`;
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    wrap.appendChild(el);
  }
  setTimeout(() => { wrap.innerHTML = ''; }, 4000);
}

/* ===== ЧАСТИЦЫ ===== */
(function() {
  const wrap = document.getElementById('particles');
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 3 + Math.random() * 5;
    p.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;background:rgba(245,200,66,0.5);animation-duration:${9+Math.random()*10}s;animation-delay:${Math.random()*9}s;`;
    wrap.appendChild(p);
  }
})();

buildModes();
buildSeries();
updateStats();
loadTotalFlips();

async function loadTotalFlips() {
  const el = document.getElementById('totalFlips');
  try {
    const r = await fetch('https://api.countapi.xyz/info/drink-or-not-bot/total-flips');
    const d = await r.json();
    if (d.value) {
      el.textContent = '🎲 ' + d.value.toLocaleString('ru') + ' бросков всего';
      el.classList.add('loaded');
    }
  } catch(e) {}
}

async function incrementFlips() {
  const el = document.getElementById('totalFlips');
  try {
    const r = await fetch('https://api.countapi.xyz/hit/drink-or-not-bot/total-flips');
    const d = await r.json();
    if (d.value) {
      el.textContent = '🎲 ' + d.value.toLocaleString('ru') + ' бросков всего';
      el.classList.add('loaded');
    }
  } catch(e) {}
}
</script>
