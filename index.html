<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Пить или не пить?</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #0d0d0f;
    color: #f0f0f0;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    min-height: 100dvh;
    padding: 2rem 1.5rem 3rem;
    position: relative;
  }

  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: float linear infinite;
  }
  @keyframes float {
    0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.4; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
  }

  .header {
    position: relative;
    z-index: 1;
    text-align: center;
  }
  .header h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #555;
    text-transform: uppercase;
  }

  /* ===== СЦЕНА ===== */
  .scene {
    position: relative;
    z-index: 1;
    perspective: 900px;
    width: 240px;
    height: 240px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* floater отвечает ТОЛЬКО за scale-пульс */
  .coin-floater {
    width: 100%;
    height: 100%;
    position: relative;
  }
  .coin-floater.idle {
    animation: idle-pulse 2.2s ease-in-out infinite;
  }
  @keyframes idle-pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.07); }
  }

  /* coin отвечает ТОЛЬКО за rotateY */
  .coin {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    will-change: transform;
  }

  .face {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }
  .face img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: block;
  }
  .face-front { transform: rotateY(0deg); }
  .face-back  { transform: rotateY(180deg); }

  /* свечение результата */
  .result-ring {
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }
  .result-ring.drink-ring   { box-shadow: 0 0 40px 14px rgba(74,222,128,0.6), 0 0 80px 28px rgba(74,222,128,0.2); }
  .result-ring.no-drink-ring{ box-shadow: 0 0 40px 14px rgba(239,68,68,0.6),  0 0 80px 28px rgba(239,68,68,0.2); }
  .result-ring.show         { opacity: 1; }

  /* ===== ФРАЗА ===== */
  .phrase-wrap {
    position: relative;
    z-index: 1;
    text-align: center;
    min-height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }
  .phrase {
    font-size: 1.05rem;
    font-weight: 500;
    line-height: 1.5;
    color: #666;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.45s, transform 0.45s, color 0.3s;
    padding: 0 0.5rem;
  }
  .phrase.visible  { opacity: 1; transform: translateY(0); }
  .phrase.drink    { color: #4ade80; }
  .phrase.no-drink { color: #ef4444; }

  /* ===== КНОПКА ===== */
  .btn-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
  }
  .btn {
    display: block;
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
    padding: 1rem;
    border-radius: 16px;
    border: none;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s, background 0.3s;
    background: linear-gradient(135deg, #f5c842, #e09c1a);
    color: #1a0e00;
    box-shadow: 0 4px 24px rgba(245,200,66,0.35);
  }
  .btn:active   { transform: scale(0.97); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
  .btn.drink-btn {
    background: linear-gradient(135deg, #6ee7a0, #22c55e);
    box-shadow: 0 4px 24px rgba(74,222,128,0.45);
    color: #052e16;
  }
  .btn.no-drink-btn {
    background: linear-gradient(135deg, #f87171, #ef4444);
    box-shadow: 0 4px 24px rgba(239,68,68,0.4);
    color: #fff;
  }

  /* всплывашки */
  .fx-wrap {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    overflow: hidden;
  }
  .fx-item {
    position: absolute;
    top: -40px;
    opacity: 0;
    animation: fxfall linear forwards;
  }
  @keyframes fxfall {
    0%   { opacity: 1; }
    100% { transform: translateY(110vh) rotate(var(--rot)); opacity: 0; }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="fx-wrap" id="fxWrap"></div>

<header class="header">
  <h1>Монетка решает</h1>
</header>

<div class="scene" id="scene" onclick="flipCoin()">
  <div class="coin-floater idle" id="coinFloater">
    <div class="coin" id="coin">
      <div class="face face-front"><img src="yes.png" alt="ПИТЬ"></div>
      <div class="face face-back"><img src="no.png" alt="НЕ ПИТЬ"></div>
    </div>
  </div>
  <div class="result-ring" id="resultRing"></div>
</div>

<div class="phrase-wrap">
  <div class="phrase" id="phrase"></div>
</div>

<div class="btn-wrap">
  <button class="btn" id="flipBtn" onclick="flipCoin()">🎲 Бросить монетку</button>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.ready(); }

const PHRASES_DRINK = [
  "Монетка не ошибается — наливай!",
  "Вселенная сказала «да». Кто ты такой, чтобы спорить?",
  "Судьба решила. Бармен ждёт.",
  "Хочешь не хочешь, а надо. Монетка велела.",
  "Отказать невозможно. Пить обязательно.",
  "Ты пытался. Монетка умнее.",
  "Ответ очевиден. Вопрос — за что пьём?",
  "Печень сказала нет. Монетка сказала да. Кто главный?",
  "Это не ты пьёшь — это судьба пьёт твоими руками.",
  "Медицина рекомендует. В умеренных количествах. Монетка не уточнила.",
];

const PHRASES_NO_DRINK = [
  "Монетка спасла твою печень. Цени.",
  "Трезвость — сила. Монетка знает.",
  "Завтра скажешь монетке спасибо.",
  "Вода — тоже напиток. Почти.",
  "Быть трезвым — это весело... так говорят трезвые.",
  "Монетка против. Можно поспорить — но она снова против.",
  "Сегодня нет. Завтра спроси ещё раз.",
  "Твоя печень тихо плачет от счастья.",
  "Ты выиграл. Или проиграл. Зависит от компании.",
  "Монетка проголосовала за минеральную воду.",
];

const coin        = document.getElementById('coin');
const coinFloater = document.getElementById('coinFloater');
const phrase      = document.getElementById('phrase');
const flipBtn     = document.getElementById('flipBtn');
const resultRing  = document.getElementById('resultRing');

let spinning   = false;
let currentDeg = 0;

function haptic(type) {
  try {
    if (tg?.HapticFeedback) {
      if (type === 'impact')       tg.HapticFeedback.impactOccurred('medium');
      else if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
      else if (type === 'warning') tg.HapticFeedback.notificationOccurred('warning');
    } else {
      navigator.vibrate?.([30]);
    }
  } catch(e) {}
}

function flipCoin() {
  if (spinning) return;
  spinning = true;
  flipBtn.disabled = true;
  haptic('impact');

  phrase.classList.remove('visible', 'drink', 'no-drink');
  resultRing.className = 'result-ring';
  coinFloater.classList.remove('idle');

  const result     = Math.random() < 0.5 ? 'drink' : 'no-drink';
  const spins      = 8 + Math.floor(Math.random() * 5);
  const finalAngle = result === 'drink' ? 0 : 180;
  const fromDeg    = currentDeg % 360;
  const toDeg      = fromDeg + (spins * 360 - fromDeg % 360) + finalAngle;
  const duration   = 2400;
  const start      = performance.now();

  function easeOut(t) { return 1 - Math.pow(1 - t, 3.5); }

  let spinInterval = setInterval(() => {
    const p = Math.min((performance.now() - start) / duration, 1);
    const speed = 1 - p;
    if (speed < 0.1) { clearInterval(spinInterval); return; }
    try {
      if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred(speed > 0.5 ? 'medium' : 'light');
      else navigator.vibrate?.(speed > 0.5 ? 15 : 8);
    } catch(e) {}
  }, 120);

  function animate(now) {
    const p   = Math.min((now - start) / duration, 1);
    const deg = fromDeg + (toDeg - fromDeg) * easeOut(p);
    coin.style.transform = `rotateY(${deg}deg)`;
    currentDeg = deg;
    if (p < 1) {
      requestAnimationFrame(animate);
    } else {
      clearInterval(spinInterval);
      // фиксируем финальный угол явно
      coin.style.transform = `rotateY(${finalAngle}deg)`;
      currentDeg = finalAngle;
      onLanded(result);
    }
  }

  requestAnimationFrame(animate);
}

function onLanded(result) {
  spinning = false;
  haptic(result === 'drink' ? 'success' : 'warning');

  resultRing.className = `result-ring ${result === 'drink' ? 'drink-ring' : 'no-drink-ring'} show`;

  const pool = result === 'drink' ? PHRASES_DRINK : PHRASES_NO_DRINK;
  phrase.textContent = pool[Math.floor(Math.random() * pool.length)];
  phrase.className   = `phrase ${result} visible`;

  flipBtn.className   = `btn ${result}-btn`;
  flipBtn.textContent = '🎲 Ещё раз';
  flipBtn.disabled    = false;

  if (result === 'drink') spawnFireworks();
  else spawnSadEmojis();

  // idle на floater — coin.style.transform остаётся нетронутым
  setTimeout(() => coinFloater.classList.add('idle'), 400);
}

function spawnFireworks() {
  const wrap = document.getElementById('fxWrap');
  wrap.innerHTML = '';
  const colors = ['#4ade80','#22c55e','#86efac','#f5c842','#fff','#bbf7d0'];
  for (let i = 0; i < 55; i++) {
    const el = document.createElement('div');
    el.className = 'fx-item';
    const size = 6 + Math.random() * 10;
    const rot  = Math.round(Math.random() * 720 - 360);
    el.style.cssText = `
      left:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>.4?'50%':'3px'};
      --rot:${rot}deg;
      animation-delay:${Math.random()*0.6}s;
      animation-duration:${1.3+Math.random()*1}s;
    `;
    wrap.appendChild(el);
  }
  setTimeout(() => { wrap.innerHTML = ''; }, 2800);
}

function spawnSadEmojis() {
  const wrap   = document.getElementById('fxWrap');
  wrap.innerHTML = '';
  const emojis = ['😢','😭','😔','💔','😞','🥲','😿'];
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'fx-item';
    const size = 22 + Math.random() * 16;
    const rot  = Math.round(Math.random() * 40 - 20);
    el.style.cssText = `
      left:${Math.random()*100}%;
      font-size:${size}px;
      --rot:${rot}deg;
      animation-delay:${Math.random()*0.8}s;
      animation-duration:${2+Math.random()*1.2}s;
    `;
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    wrap.appendChild(el);
  }
  setTimeout(() => { wrap.innerHTML = ''; }, 4000);
}

(function spawnParticles() {
  const wrap = document.getElementById('particles');
  for (let i = 0; i < 12; i++) {
    const p  = document.createElement('div');
    p.className = 'particle';
    const size = 3 + Math.random() * 5;
    p.style.cssText = `
      left:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      background:rgba(245,200,66,0.5);
      animation-duration:${9+Math.random()*10}s;
      animation-delay:${Math.random()*9}s;
    `;
    wrap.appendChild(p);
  }
})();
</script>
</body>
</html>
