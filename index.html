<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Пить или не пить?</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #f5c842;
  --gold2: #c9952a;
  --green: #4ade80;
  --red: #ef4444;
  --bg: #0e0e10;
  --bg2: #161618;
  --bg3: #1c1c1f;
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f0;
  --muted: #555;
  --muted2: #333;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  padding: 0;
}

/* частицы */
.particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.particle  { position: absolute; border-radius: 50%; opacity: 0; animation: pfloat linear infinite; }
@keyframes pfloat {
  0%   { transform: translateY(100vh); opacity: 0; }
  10%  { opacity: 0.3; }
  90%  { opacity: 0.3; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* ===== ШАПКА ===== */
.header {
  position: relative;
  z-index: 2;
  padding: 14px 0 10px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.header h1 {
  font-family: 'Unbounded', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* режимы — горизонтальный скролл */
.modes-wrap {
  position: relative;
}
.modes-wrap::before,
.modes-wrap::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 24px;
  z-index: 1;
  pointer-events: none;
}
.modes-wrap::before { left: 0;  background: linear-gradient(to right, var(--bg), transparent); }
.modes-wrap::after  { right: 0; background: linear-gradient(to left,  var(--bg), transparent); }

.modes {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 2px 16px 4px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.modes::-webkit-scrollbar { display: none; }

.mode-tab {
  flex-shrink: 0;
  scroll-snap-align: start;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.mode-tab .emoji { font-size: 0.85rem; }
.mode-tab.active {
  background: #1a1500;
  border-color: rgba(245,200,66,0.4);
  color: var(--gold);
}

/* ===== ОСНОВНАЯ ЗОНА ===== */
.main {
  flex: 1;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-evenly;
  gap: 0;
  padding: 8px 20px;
}

/* статистика */
.stats {
  display: flex;
  align-items: center;
  gap: 6px;
}
.stat-badge {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.68rem;
  font-weight: 600;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--muted);
  transition: all 0.3s;
}
.stat-badge.yes.active { border-color: rgba(74,222,128,0.3); color: var(--green); background: rgba(74,222,128,0.06); }
.stat-badge.no.active  { border-color: rgba(239,68,68,0.3);  color: var(--red);   background: rgba(239,68,68,0.06); }
.stat-sep { color: var(--muted2); font-size: 0.6rem; }

.total-flips {
  font-size: 0.62rem;
  color: var(--muted2);
  letter-spacing: 0.03em;
  min-height: 12px;
  transition: color 0.5s;
}
.total-flips.loaded { color: #2d2d2d; }

/* ===== МОНЕТА ===== */
.scene {
  position: relative;
  perspective: 900px;
  width: 240px;
  height: 240px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.coin-floater { width: 100%; height: 100%; }
.coin-floater.idle { animation: idle-pulse 2.2s ease-in-out infinite; }
@keyframes idle-pulse {
  0%, 100% { transform: scale(1); }
  50%       { transform: scale(1.06); }
}
.coin {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  will-change: transform;
}
.face {
  position: absolute; inset: 0;
  border-radius: 50%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
}
.face img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
.face-front { transform: rotateY(0deg); }
.face-back  { transform: rotateY(180deg); }

.result-ring {
  position: absolute; inset: -10px;
  border-radius: 50%; opacity: 0;
  transition: opacity 0.4s; pointer-events: none;
}
.result-ring.drink-ring    { box-shadow: 0 0 36px 12px rgba(74,222,128,0.5), 0 0 70px 24px rgba(74,222,128,0.15); }
.result-ring.no-drink-ring { box-shadow: 0 0 36px 12px rgba(239,68,68,0.5),  0 0 70px 24px rgba(239,68,68,0.15); }
.result-ring.show          { opacity: 1; }

/* серия точки */
.series-dots {
  display: flex; gap: 7px; align-items: center;
  min-height: 12px;
}
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--muted2);
  transition: all 0.3s;
}
.dot.yes { background: var(--green); border-color: var(--green); box-shadow: 0 0 6px rgba(74,222,128,0.5); }
.dot.no  { background: var(--red);   border-color: var(--red);   box-shadow: 0 0 6px rgba(239,68,68,0.5); }

/* фраза */
.phrase-wrap {
  min-height: 46px;
  display: flex; align-items: center; justify-content: center;
  width: 100%; text-align: center;
}
.phrase {
  font-size: 0.9rem; font-weight: 500; line-height: 1.5;
  color: var(--muted); opacity: 0; transform: translateY(8px);
  transition: opacity 0.3s, transform 0.3s;
  padding: 0 4px;
}
.phrase.visible { opacity: 1; transform: translateY(0); }
.phrase.drink    { color: var(--green); }
.phrase.no-drink { color: var(--red); }
.phrase span {
  display: inline-block; opacity: 0; transform: translateY(5px);
  animation: li 0.22s forwards;
}
@keyframes li { to { opacity: 1; transform: translateY(0); } }

/* ===== НИЖНЯЯ ПАНЕЛЬ ===== */
.bottom {
  position: relative;
  z-index: 2;
  padding: 12px 16px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* главная кнопка + share */
.action-row {
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: center;
}

.btn-flip {
  flex: 0 1 260px;
  padding: 14px 20px;
  border-radius: 14px; border: none;
  font-family: 'Unbounded', sans-serif;
  font-size: 0.82rem; font-weight: 700;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.2s, background 0.3s;
  background: linear-gradient(135deg, #f5c842, #d4951a);
  color: #1a0e00;
  box-shadow: 0 4px 20px rgba(245,200,66,0.25);
}
.btn-flip:active   { transform: scale(0.97); }
.btn-flip:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-flip.drink    { background: linear-gradient(135deg, #6ee7a0, #22c55e); box-shadow: 0 4px 20px rgba(74,222,128,0.3); color: #052e16; }
.btn-flip.no-drink { background: linear-gradient(135deg, #f87171, #ef4444); box-shadow: 0 4px 20px rgba(239,68,68,0.3); color: #fff; }

.btn-share {
  flex-shrink: 0;
  width: 48px; height: 48px;
  border-radius: 14px; border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--muted);
  font-size: 1rem; font-weight: 600;
  cursor: pointer;
  display: none;
  align-items: center; justify-content: center;
  transition: all 0.2s;
}
.btn-share:hover { border-color: rgba(255,255,255,0.15); color: #aaa; }
.btn-share.show { display: flex; }

/* серия */
.series-row {
  display: flex;
  gap: 6px;
  align-items: center;
  justify-content: center;
}
.btn-series {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  font-size: 0.7rem; font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-series.active {
  border-color: rgba(245,200,66,0.35);
  color: var(--gold);
  background: #1a1500;
}
.btn-reset {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--muted2);
  font-size: 0.7rem;
  cursor: pointer;
  display: none;
  align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.btn-reset:hover { border-color: rgba(239,68,68,0.4); color: var(--red); }
.btn-reset.show  { display: flex; }

/* футер */
.footer {
  position: relative; z-index: 2;
  text-align: center;
  padding-bottom: 6px;
}
.footer a {
  display: inline-flex; align-items: center; gap: 5px;
  text-decoration: none; opacity: 0.18; transition: opacity 0.2s;
}
.footer a:hover { opacity: 0.4; }

/* тост */
.toast {
  position: fixed; bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--bg3); border: 1px solid rgba(255,255,255,0.1);
  color: #ccc; font-size: 0.78rem; font-weight: 500;
  padding: 7px 16px; border-radius: 20px;
  opacity: 0; transition: all 0.25s; z-index: 100;
  white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* fx */
.fx-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 10; overflow: hidden; }
.fx-item { position: absolute; top: -40px; opacity: 0; animation: fxfall linear forwards; }
@keyframes fxfall {
  0%   { opacity: 1; }
  100% { transform: translateY(110vh) rotate(var(--rot)); opacity: 0; }
}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="fx-wrap" id="fxWrap"></div>
<div class="toast" id="toast"></div>

<!-- ШАПКА -->
<header class="header">
  <h1>Монетка решает</h1>
  <div class="modes-wrap">
    <div class="modes" id="modes"></div>
  </div>
</header>

<!-- ОСНОВНАЯ ЗОНА -->
<main class="main">
  <div class="stats">
    <div class="stat-badge yes" id="yesCount">—</div>
    <span class="stat-sep">·</span>
    <div class="stat-badge no" id="noCount">—</div>
  </div>
  <div class="online-wrap" id="onlineWrap" style="display:none">
    <span class="online-dot"></span>
    <span class="online-text" id="onlineCount"></span>
  </div>

  <div class="scene" id="scene" onclick="flipCoin()">
    <div class="coin-floater idle" id="coinFloater">
      <div class="coin" id="coin">
        <div class="face face-front"><img id="imgYes" src="yes.png" alt="Да"></div>
        <div class="face face-back"><img id="imgNo"  src="no.png"  alt="Нет"></div>
      </div>
    </div>
    <div class="result-ring" id="resultRing"></div>
  </div>

  <div class="series-dots" id="seriesDots"></div>

  <div class="phrase-wrap">
    <div class="phrase" id="phrase"></div>
  </div>

  <div class="total-flips" id="totalFlips"></div>
</main>

<!-- НИЖНЯЯ ПАНЕЛЬ -->
<div class="bottom">
  <div class="action-row">
    <button class="btn-flip" id="flipBtn" onclick="flipCoin()">🎲 Бросить монетку</button>
    <button class="btn-share" id="shareBtn" onclick="shareResult()">↗</button>
  </div>
  <div class="series-row" id="seriesRow"></div>
</div>

<footer class="footer">
  <a href="https://t.me/dreamskies">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="#f0f0f0"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L8.32 14.617l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.828.942z"/></svg>
    <span style="font-family:'Inter',sans-serif;font-size:0.65rem;font-weight:600;color:#f0f0f0;letter-spacing:0.04em;">DreamSkies</span>
  </a>
</footer>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.ready(); }

const MODES = [
  {
    label: 'Пить', emoji: '🍺',
    imgYes: 'yes.png', imgNo: 'no.png',
    yes: 'ПИТЬ', no: 'НЕ ПИТЬ',
    phrasesYes: [
      "Монетка не ошибается — наливай!",
      "Вселенная сказала «да». Кто ты такой, чтобы спорить?",
      "Судьба решила. Бармен ждёт.",
      "Печень сказала нет. Монетка сказала да. Кто главный?",
      "Это не ты пьёшь — это судьба пьёт твоими руками.",
      "Медицина рекомендует. В умеренных количествах.",
    ],
    phrasesNo: [
      "Монетка спасла твою печень. Цени.",
      "Трезвость — сила. Монетка знает.",
      "Завтра скажешь монетке спасибо.",
      "Быть трезвым — это весело... так говорят трезвые.",
      "Монетка против. Можно поспорить — но она снова против.",
      "Твоя печень тихо плачет от счастья.",
    ],
  },
  {
    label: 'Идти', emoji: '🚶',
    imgYes: 'go_yes.png', imgNo: 'go_no.png',
    yes: 'ИДТИ', no: 'ОСТАТЬСЯ',
    phrasesYes: ["Ноги сами знают дорогу.", "Вперёд — монетка не трус.", "Судьба зовёт. Вставай.", "Там лучше. Монетка проверила."],
    phrasesNo:  ["Диван мудрее монетки. Иногда.", "Остаёшься. Уютно тут.", "Никуда не надо. Монетка разрешила.", "Домашний режим активирован."],
  },
  {
    label: 'Звонить', emoji: '📞',
    imgYes: 'call_yes.png', imgNo: 'call_no.png',
    yes: 'ЗВОНИТЬ', no: 'НЕ ЗВОНИТЬ',
    phrasesYes: ["Звони. Монетка берёт ответственность.", "Нажимай. Судьба набирает номер.", "Звонишь. Что будет — то будет."],
    phrasesNo:  ["Не звони. Напиши лучше.", "Тишина — тоже ответ.", "Завтра. Монетка так решила."],
  },
  {
    label: 'Пицца', emoji: '🍕',
    imgYes: 'pizza_yes.png', imgNo: 'pizza_no.png',
    yes: 'ЗАКАЗАТЬ', no: 'НЕ НАДО',
    phrasesYes: ["Заказывай. Голод — не тётка.", "Пицца одобрена судьбой.", "Ты заслужил. Монетка знает."],
    phrasesNo:  ["Холодильник ближе. Монетка экономит.", "Приготовь сам. Монетка верит в тебя.", "Яичница тоже еда."],
  },
  {
    label: 'Спать', emoji: '😴',
    imgYes: 'sleep_yes.png', imgNo: 'sleep_no.png',
    yes: 'СПАТЬ', no: 'НЕ СПАТЬ',
    phrasesYes: ["Спать. Немедленно. Монетка строга.", "Подушка ждёт. Монетка тоже устала.", "Всё подождёт до утра."],
    phrasesNo:  ["Ещё один эпизод. Монетка разрешает.", "Ночь молода. Монетка бодрствует.", "В интернете столько всего интересного..."],
  },
];

const SERIES_OPTIONS = [0, 3, 5];

let spinning = false, currentDeg = 0;
let currentMode = 0, seriesIdx = 0;
let seriesScore  = { yes: 0, no: 0 };
let modeStats    = MODES.map(() => ({ yes: 0, no: 0 }));
let lastResult   = null, lastPhrase = '';
let audioCtx;

const coin        = document.getElementById('coin');
const coinFloater = document.getElementById('coinFloater');
const phraseEl    = document.getElementById('phrase');
const flipBtn     = document.getElementById('flipBtn');
const shareBtn    = document.getElementById('shareBtn');
const resultRing  = document.getElementById('resultRing');
const seriesDots  = document.getElementById('seriesDots');
const yesCountEl  = document.getElementById('yesCount');
const noCountEl   = document.getElementById('noCount');
const toastEl     = document.getElementById('toast');

/* РЕЖИМЫ */
function buildModes() {
  const wrap = document.getElementById('modes');
  MODES.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'mode-tab' + (i === 0 ? ' active' : '');
    btn.innerHTML = `<span class="emoji">${m.emoji}</span>${m.label}`;
    btn.onclick = () => setMode(i);
    wrap.appendChild(btn);
  });
  // spacer — фикс правого края при overflow scroll
  const spacer = document.createElement('div');
  spacer.style.cssText = 'min-width:16px;flex-shrink:0;';
  wrap.appendChild(spacer);
}

function setMode(i) {
  currentMode = i;
  document.querySelectorAll('.mode-tab').forEach((b, j) => b.classList.toggle('active', j === i));
  const m = MODES[i];
  document.getElementById('imgYes').src = m.imgYes;
  document.getElementById('imgNo').src  = m.imgNo;
  resetRound();
  updateStats();
}

/* СЕРИЯ */
function buildSeries() {
  const wrap = document.getElementById('seriesRow');
  ['Выкл', 'Лучший из 3', 'Лучший из 5'].forEach((label, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-series' + (i === 0 ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => setSeries(i);
    wrap.appendChild(btn);
  });
  const reset = document.createElement('button');
  reset.id = 'resetBtn';
  reset.className = 'btn-reset';
  reset.innerHTML = '✕';
  reset.title = 'Сбросить серию';
  reset.onclick = resetSeries;
  wrap.appendChild(reset);
}

function setSeries(i) {
  seriesIdx = i;
  seriesScore = { yes: 0, no: 0 };
  document.querySelectorAll('.btn-series').forEach((b, j) => b.classList.toggle('active', j === i));
  document.getElementById('resetBtn').classList.toggle('show', i > 0);
  renderSeriesDots();
  resetRound();
}

function resetSeries() {
  seriesScore = { yes: 0, no: 0 };
  renderSeriesDots();
  showToast('Серия сброшена');
}

function renderSeriesDots() {
  const total = SERIES_OPTIONS[seriesIdx];
  seriesDots.innerHTML = '';
  if (!total) return;
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < seriesScore.yes ? ' yes' : '') + (i >= total - seriesScore.no ? ' no' : '');
    seriesDots.appendChild(d);
  }
}

/* СТАТИСТИКА */
function updateStats() {
  const s = modeStats[currentMode], m = MODES[currentMode];
  const yLabel = m.yes[0] + m.yes.slice(1).toLowerCase();
  const nLabel = m.no[0]  + m.no.slice(1).toLowerCase();
  yesCountEl.textContent = yLabel + ': ' + s.yes;
  noCountEl.textContent  = nLabel + ': ' + s.no;
  yesCountEl.classList.toggle('active', s.yes > 0);
  noCountEl.classList.toggle('active', s.no > 0);
}

/* ЗВУК */
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTick() {
  try {
    const ctx = getAudio(), o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 500 + Math.random()*300; o.type = 'sine';
    g.gain.setValueAtTime(0.06, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
    o.start(); o.stop(ctx.currentTime + 0.04);
  } catch(e) {}
}
function playResult(win) {
  try {
    const ctx = getAudio();
    (win ? [523,659,784,1047] : [400,340,280]).forEach((f,i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f; o.type = 'sine';
      const t = ctx.currentTime + i * (win ? 0.1 : 0.13);
      g.gain.setValueAtTime(0.1, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      o.start(t); o.stop(t + 0.22);
    });
  } catch(e) {}
}

/* ХАПТИК */
function haptic(type) {
  try {
    if (tg?.HapticFeedback) {
      if (type === 'impact')       tg.HapticFeedback.impactOccurred('medium');
      else if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
      else if (type === 'warning') tg.HapticFeedback.notificationOccurred('warning');
    } else navigator.vibrate?.([25]);
  } catch(e) {}
}

/* ТОСТ */
function showToast(text) {
  toastEl.textContent = text;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2000);
}

/* СБРОС */
function resetRound() {
  phraseEl.className = 'phrase'; phraseEl.innerHTML = '';
  resultRing.className = 'result-ring';
  shareBtn.classList.remove('show');
  flipBtn.className = 'btn-flip';
  flipBtn.textContent = '🎲 Бросить монетку';
  flipBtn.disabled = false;
  lastResult = null;
}

/* БРОСОК */
function flipCoin() {
  if (spinning) return;
  spinning = true;
  flipBtn.disabled = true;
  shareBtn.classList.remove('show');
  haptic('impact');
  incrementFlips();

  phraseEl.className = 'phrase'; phraseEl.innerHTML = '';
  resultRing.className = 'result-ring';
  coinFloater.classList.remove('idle');

  const result     = Math.random() < 0.5 ? 'yes' : 'no';
  const finalAngle = result === 'yes' ? 0 : 180;
  const fromDeg    = currentDeg % 360;
  const spins      = 8 + Math.floor(Math.random() * 5);
  const toDeg      = fromDeg + (spins * 360 - fromDeg % 360) + finalAngle;
  const duration   = 2400;
  const start      = performance.now();
  let lastTick     = 0;

  function easeOut(t) { return 1 - Math.pow(1 - t, 3.5); }

  const spinInterval = setInterval(() => {
    const p = Math.min((performance.now() - start) / duration, 1);
    const speed = 1 - p;
    if (speed < 0.08) { clearInterval(spinInterval); return; }
    try {
      if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred(speed > 0.5 ? 'medium' : 'light');
      else navigator.vibrate?.(speed > 0.5 ? 12 : 6);
    } catch(e) {}
    if (performance.now() - lastTick > 90) { playTick(); lastTick = performance.now(); }
  }, 120);

  function animate(now) {
    const p   = Math.min((now - start) / duration, 1);
    const deg = fromDeg + (toDeg - fromDeg) * easeOut(p);
    coin.style.transform = `rotateY(${deg}deg)`;
    currentDeg = deg;
    if (p < 1) {
      requestAnimationFrame(animate);
    } else {
      clearInterval(spinInterval);
      coin.style.transform = `rotateY(${finalAngle}deg)`;
      currentDeg = finalAngle;
      onLanded(result);
    }
  }

  requestAnimationFrame(animate);
}

/* РЕЗУЛЬТАТ */
function onLanded(result) {
  spinning = false; lastResult = result;
  const mode = MODES[currentMode], isYes = result === 'yes';

  haptic(isYes ? 'success' : 'warning');
  playResult(isYes);

  modeStats[currentMode][result]++;
  updateStats();

  resultRing.className = `result-ring ${isYes ? 'drink-ring' : 'no-drink-ring'} show`;

  const pool = isYes ? mode.phrasesYes : mode.phrasesNo;
  lastPhrase = pool[Math.floor(Math.random() * pool.length)];
  animatePhrase(lastPhrase, isYes ? 'drink' : 'no-drink');

  flipBtn.className   = 'btn-flip ' + (isYes ? 'drink' : 'no-drink');
  flipBtn.textContent = '🎲 Ещё раз';
  flipBtn.disabled    = false;
  shareBtn.classList.add('show');

  const total = SERIES_OPTIONS[seriesIdx];
  if (total) {
    seriesScore[result]++;
    renderSeriesDots();
    if (seriesScore[result] >= Math.ceil(total / 2)) {
      const winner = isYes ? mode.yes : mode.no;
      setTimeout(() => {
        showToast('🏆 ' + winner + ' побеждает в серии!');
        seriesScore = { yes: 0, no: 0 };
        setTimeout(() => renderSeriesDots(), 2200);
      }, 600);
    }
  }

  if (isYes) spawnFireworks(); else spawnSadEmojis();
  setTimeout(() => coinFloater.classList.add('idle'), 400);
}

/* АНИМАЦИЯ БУКВ */
function animatePhrase(text, cls) {
  phraseEl.innerHTML = text.split('').map((ch, i) =>
    `<span style="animation-delay:${i*24}ms">${ch === ' ' ? '&nbsp;' : ch}</span>`
  ).join('');
  phraseEl.className = `phrase ${cls} visible`;
}

/* ПОДЕЛИТЬСЯ */
async function shareResult() {
  if (!lastResult) return;
  const m = MODES[currentMode];
  const label = lastResult === 'yes' ? m.yes : m.no;
  const text = `${lastResult === 'yes' ? '✅' : '❌'} Монетка решила: ${label}!\n"${lastPhrase}"\n\nt.me/drink_or_not_bot/coin`;
  try {
    if (navigator.share) await navigator.share({ text });
    else { await navigator.clipboard.writeText(text); showToast('Скопировано!'); }
  } catch(e) {
    try { await navigator.clipboard.writeText(text); showToast('Скопировано!'); } catch(e2) {}
  }
}

function plural(n, one, few, many) {
  const m10 = n % 10, m100 = n % 100;
  if (m100 >= 11 && m100 <= 14) return many;
  if (m10 === 1) return one;
  if (m10 >= 2 && m10 <= 4) return few;
  return many;
}
